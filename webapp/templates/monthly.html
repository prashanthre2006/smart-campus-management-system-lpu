<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monthly Report</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;600;700&display=swap");
      :root { --bg:#0d1321; --panel:#111a2b; --line:#24324f; --text:#e7edf9; --muted:#9fb0cf; --accent:#f9a826; }
      body { margin:0; padding:24px; font-family:"Manrope",sans-serif; background:var(--bg); color:var(--text); }
      .shell { max-width:1050px; margin:0 auto; }
      .top { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
      .title { font-family:"Playfair Display",serif; font-size:32px; margin:0; }
      .links a { color:var(--muted); text-decoration:none; border:1px solid var(--line); border-radius:999px; padding:8px 12px; margin-right:8px; }
      .panel { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; }
      .actions { margin:10px 0; display:flex; gap:8px; flex-wrap:wrap; }
      button { background:linear-gradient(120deg,#f9a826,#f97316); color:#1e160d; border:none; padding:9px 12px; border-radius:8px; cursor:pointer; font-weight:700; }
      table { width:100%; border-collapse:collapse; margin-top:8px; }
      th, td { border-bottom:1px solid var(--line); padding:9px 6px; text-align:left; }
      th { color:var(--muted); font-size:13px; }
      .muted { color:var(--muted); }
    </style>
    {% include 'theme_style.html' %}
  </head>
  <body>
    <div class="shell">
      <div class="top">
        <h1 class="title">Monthly Attendance Report</h1>
        <div class="links"><a href="/dashboard">Dashboard</a><a href="/admin">Admin Panel</a></div>
      </div>
      <div class="panel">
        <div class="actions">
          <button onclick="exportExcel()">Export Excel</button>
          <button onclick="exportPdf()">Export PDF</button>
        </div>
        <div id="summary" class="muted"></div>
        <table>
          <thead><tr><th>Student</th><th>Marked Count</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <script>
      async function loadMonthly() {
        const res = await fetch("/api/monthly-report");
        const data = await res.json();
        if (!data.ok) return;
        document.getElementById("summary").innerText = `Month: ${data.data.month} | Total Records: ${data.data.total_records}`;
        const rows = data.data.per_student || [];
        document.getElementById("rows").innerHTML = rows.length ? rows.map((r) => `<tr><td>${r.student__name}</td><td>${r.count}</td></tr>`).join("") : "<tr><td colspan='2'>No monthly records found.</td></tr>";
      }
      function exportExcel() { window.location.href = "/api/export"; }
      function exportPdf() { window.location.href = "/api/export-pdf"; }
      loadMonthly();
    </script>
  </body>
</html>
